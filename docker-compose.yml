services:

  ollama:
    image: ollama/ollama:0.6.8
    container_name: geoint_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    mem_limit: 8g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  ollama-init:
    image: ollama/ollama:0.6.8
    container_name: geoint_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./ollama_geoint.modelfile:/tmp/ollama_geoint.modelfile:ro
    entrypoint: >
      sh -c "
        ollama pull gemma3:4b &&
        ollama create atalaya-geoint -f /tmp/ollama_geoint.modelfile &&
        echo 'Model ready.'
      "
    profiles:
      - ollama-init

  geoint:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geoint_runner
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8765:8765"
    volumes:
      - ./outputs:/app/outputs
      - ./.env:/app/.env:ro
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma3:4b
    restart: on-failure
    profiles:
      - run

volumes:
  ollama_data:
