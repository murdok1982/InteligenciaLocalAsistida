version: "3.9"

services:

  ollama:
    image: ollama/ollama:latest
    container_name: geoint_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    deploy:
      resources:
        limits:
          memory: 8g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  ollama-init:
    image: ollama/ollama:latest
    container_name: geoint_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama_geoint.modelfile:/tmp/ollama_geoint.modelfile:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        ollama pull gemma4:4b &&
        ollama create atalaya-geoint -f /tmp/ollama_geoint.modelfile &&
        echo 'Model ready.'
      "
    profiles:
      - ollama-init

  geoint:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geoint_runner
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./outputs:/app/outputs
      - ./.env:/app/.env:ro
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=atalaya-geoint
    restart: "no"
    profiles:
      - run

volumes:
  ollama_data:
